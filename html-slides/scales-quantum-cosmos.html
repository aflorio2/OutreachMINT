<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Two Infinities — Symmetric Scales of the Universe</title>
<style>
  :root{
    --bg:#05060d;
    --ink:#eef2ff;
    --muted:#8b93b8;
    --accentL:#6ad7ff;   /* quantum / cold */
    --accentR:#ffb24a;   /* cosmic / warm */
    --line:#1c2238;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:radial-gradient(1200px 800px at 50% -10%, #11162b 0%, var(--bg) 60%);
    color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    overflow:hidden;height:100vh;display:flex;flex-direction:column;
  }
  header{text-align:center;padding:16px 16px 8px;flex:0 0 auto}
  header h1{font-size:clamp(19px,2.5vw,32px);font-weight:700;letter-spacing:.4px}
  header h1 .q{color:var(--accentL)} header h1 .c{color:var(--accentR)}
  header p{color:var(--muted);font-size:clamp(12px,1.2vw,15px);margin-top:4px}
  header .lede{list-style:none;margin-top:6px;display:flex;justify-content:center}
  header .lede li{position:relative;padding-left:18px;color:var(--muted);font-size:clamp(12px,1.2vw,15px)}
  header .lede li::before{content:"•";position:absolute;left:2px;color:var(--ink);opacity:.6}

  .stage{flex:1 1 auto;display:flex;padding:0 18px;min-height:0}
  .panel{position:relative;flex:1 1 50%;border:1px solid var(--line);border-radius:16px;
    overflow:hidden;background:#000;box-shadow:0 0 40px rgba(0,0,0,.6) inset}
  .panel.left{border-color:#1d3a4a} .panel.right{border-color:#4a3a1d}

  .divider{flex:0 0 64px;position:relative;display:flex;align-items:center;justify-content:center}
  .divider::before{content:"";position:absolute;top:8%;bottom:8%;left:50%;width:2px;
    transform:translateX(-50%);background:linear-gradient(var(--accentL),#ffffff44,var(--accentR));
    box-shadow:0 0 18px #ffffff55}
  .divider .vs{position:relative;width:50px;height:50px;border-radius:50%;background:var(--bg);
    border:1px solid var(--line);display:flex;align-items:center;justify-content:center;
    font-size:11px;color:var(--muted);font-weight:600;letter-spacing:1px;text-align:center;line-height:1.1}

  .imgwrap{position:absolute;inset:0;overflow:hidden}
  .layer{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    will-change:transform,opacity;backface-visibility:hidden}
  .layer .imgbox{width:82%;height:82%;border-radius:10px;overflow:hidden;
    box-shadow:0 0 60px rgba(0,0,0,.7)}
  .layer .imgbox img{width:100%;height:100%;object-fit:cover;display:block;
    transform-origin:center;user-select:none;-webkit-user-drag:none}
  .layer .contentbox{width:88%;height:88%;border-radius:10px;overflow:hidden;
    box-shadow:0 0 60px rgba(0,0,0,.7);position:relative;display:flex;align-items:center;justify-content:center}
  .layer .contentbox.nuc{background:radial-gradient(circle at 50% 45%, #1a1030, #05060d 70%)}
  .layer .contentbox.human{background:radial-gradient(circle at 50% 32%, #1a2440, #05060d 72%)}
  .layer .contentbox.human svg{filter:drop-shadow(0 0 14px #ffffff40)}
  .layer .contentbox svg{width:70%;height:70%}

  /* distance diagrams */
  .diagram{position:relative;width:100%;height:100%;
    background:radial-gradient(circle at 50% 50%, #0a1230 0%, #03040c 75%)}
  .diagram.space{background:#02030a}
  .diagram.space::before{content:"";position:absolute;inset:0;opacity:.7;
    background-image:radial-gradient(1.2px 1.2px at 12% 22%,#fff,transparent),
      radial-gradient(1px 1px at 28% 68%,#cfe,transparent),
      radial-gradient(1.4px 1.4px at 47% 38%,#fff,transparent),
      radial-gradient(1px 1px at 62% 80%,#fff,transparent),
      radial-gradient(1.2px 1.2px at 78% 28%,#ffd,transparent),
      radial-gradient(1px 1px at 88% 62%,#fff,transparent),
      radial-gradient(1px 1px at 38% 88%,#fff,transparent)}
  .dline{position:absolute;left:9%;right:9%;top:50%;height:0;border-top:2px dashed #ffffff80;transform:translateY(-50%)}
  .dline::before,.dline::after{content:"";position:absolute;top:-4px;width:0;height:0;
    border-top:4px solid transparent;border-bottom:4px solid transparent}
  .dline::before{left:-2px;border-right:7px solid #ffffff80}
  .dline::after{right:-2px;border-left:7px solid #ffffff80}
  .dbody{position:absolute;top:50%;transform:translateY(-50%);border-radius:50%;
    aspect-ratio:1/1;overflow:hidden;box-shadow:0 0 24px #000a}
  .dbody img{width:100%;height:100%;object-fit:cover;display:block}
  .dstar{position:absolute;top:50%;transform:translate(-50%,-50%);border-radius:50%;
    background:radial-gradient(circle,#fff 0%,#cfe8ff 30%,#5aa6ff 60%,transparent 72%);
    filter:drop-shadow(0 0 8px #9cf)}
  .dcap{position:absolute;font-size:clamp(9px,1vw,12px);color:#cdd6ff;text-align:center;
    transform:translateX(-50%);white-space:nowrap;text-shadow:0 1px 3px #000}
  .dpill{position:absolute;left:50%;top:calc(50% - 30px);transform:translateX(-50%);
    font-size:clamp(11px,1.25vw,15px);font-weight:600;color:#fff;background:#0009;
    border:1px solid #ffffff33;padding:4px 10px;border-radius:20px;white-space:nowrap;backdrop-filter:blur(3px)}

  .tag{position:absolute;top:14px;left:14px;z-index:5;font-size:12px;letter-spacing:2px;
    font-weight:700;text-transform:uppercase;padding:6px 10px;border-radius:8px;
    background:#0008;backdrop-filter:blur(4px)}
  .left .tag{color:var(--accentL);border:1px solid #1d3a4a}
  .right .tag{color:var(--accentR);border:1px solid #4a3a1d}

  .readout{position:absolute;bottom:14px;left:14px;right:14px;z-index:5;
    display:flex;justify-content:space-between;align-items:flex-end;gap:10px;pointer-events:none}
  .readout .col{display:flex;flex-direction:column;gap:3px}
  .right .readout .col{align-items:flex-end;text-align:right}
  .readout .name{font-size:clamp(17px,2.1vw,28px);font-weight:700;line-height:1}
  .readout .sub{font-size:clamp(11px,1.15vw,14px);color:#c9d1f5}
  .reflink{pointer-events:auto;display:none;font-size:clamp(9.5px,1vw,12px);margin-top:2px;
    text-decoration:none;background:#0009;border:1px solid #ffffff33;padding:2px 7px;border-radius:6px;
    backdrop-filter:blur(3px);width:fit-content}
  .left .reflink{color:var(--accentL)} .right .reflink{color:var(--accentR)}
  .reflink:hover{background:#ffffff22}
  .readout .size{font-variant-numeric:tabular-nums;font-size:clamp(12px,1.3vw,16px);
    color:var(--muted);background:#0008;padding:3px 8px;border-radius:8px;backdrop-filter:blur(4px)}
  .left .name{color:var(--accentL)} .right .name{color:var(--accentR)}

  .controls{flex:0 0 auto;padding:14px 24px 20px;display:flex;flex-direction:column;align-items:center;gap:10px}
  .ticks{width:min(1000px,94vw);display:flex;justify-content:space-between;font-size:10.5px;
    color:var(--muted);letter-spacing:.3px}
  .ticks span{flex:1;text-align:center;cursor:pointer;transition:color .2s;padding:0 2px}
  .ticks span.active{color:var(--ink);font-weight:700}
  .sliderrow{width:min(1000px,94vw);display:flex;align-items:center;gap:16px}
  input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:6px;border-radius:6px;
    background:linear-gradient(90deg,var(--accentL),#ffffff66,var(--accentR));outline:none;cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;
    border-radius:50%;background:#fff;border:3px solid #0a0d1a;box-shadow:0 0 12px #fff8;cursor:grab}
  input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#fff;
    border:3px solid #0a0d1a;box-shadow:0 0 12px #fff8;cursor:grab}
  button.nav{background:#121734;color:var(--ink);border:1px solid var(--line);border-radius:10px;
    width:46px;height:40px;font-size:18px;cursor:pointer;transition:background .15s,transform .1s}
  button.nav:hover{background:#1b2350} button.nav:active{transform:scale(.94)}
  .hint{color:var(--muted);font-size:12px}
  .hint b{color:var(--ink)}
</style>
</head>
<body>
  <header>
    <h1><span class="q">The Very Small</span> &nbsp;⟷&nbsp; <span class="c">The Very Large</span></h1>
    <ul class="lede"><li>Each step <b>inward</b> (left) mirrors a step <b>outward</b> (right) — the same factor in opposite directions.</li></ul>
  </header>

  <div class="stage">
    <div class="panel left" id="panelL">
      <div class="tag">Zoom in · matter</div>
      <div class="imgwrap" id="wrapL"></div>
      <div class="readout"><div class="col"><div class="name" id="nameL"></div><div class="sub" id="subL"></div><a class="reflink" id="refL" target="_blank" rel="noopener"></a></div><div class="size" id="sizeL"></div></div>
    </div>

    <div class="divider"></div>

    <div class="panel right" id="panelR">
      <div class="tag">Zoom out · space</div>
      <div class="imgwrap" id="wrapR"></div>
      <div class="readout"><div class="size" id="sizeR"></div><div class="col"><div class="name" id="nameR"></div><div class="sub" id="subR"></div><a class="reflink" id="refR" target="_blank" rel="noopener"></a></div></div>
    </div>
  </div>

  <div class="controls">
    <div class="ticks" id="ticks"></div>
    <div class="sliderrow">
      <button class="nav" id="prev" title="Step toward human scale (←)">◀</button>
      <input type="range" id="slider" min="0" max="3000" value="0">
      <button class="nav" id="next" title="Step outward (→)">▶</button>
    </div>
    <div class="hint">Drag the slider, use <b>◀ ▶</b> or the <b>arrow keys</b>, or click a label. Pairs marked <b>≈</b> are the classic order-of-magnitude analogies.</div>
  </div>

<script>
const FP = "https://commons.wikimedia.org/wiki/Special:FilePath/";
function fpath(name){return FP + encodeURIComponent(name);}
const CB = "?v=" + Date.now();                 // cache-buster for local files
const IMG_BASE = "../imgs-web/";                // web-optimized images live in OutreachMINT/imgs-web/
function lsrc(name){return encodeURI(IMG_BASE + name) + CB;}

// Inline SVG for the atomic nucleus (cannot be photographed) — a packed cluster of nucleons.
const NUCLEUS_SVG = `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="p" cx="35%" cy="30%"><stop offset="0%" stop-color="#ff9a8b"/><stop offset="100%" stop-color="#c0392b"/></radialGradient>
    <radialGradient id="n" cx="35%" cy="30%"><stop offset="0%" stop-color="#9ad0ff"/><stop offset="100%" stop-color="#2c6fb3"/></radialGradient>
  </defs>
  ${(() => {
    const pos=[[100,100],[80,86],[120,86],[86,118],[114,118],[100,74],[72,104],[128,104],[100,126],[88,98],[112,98],[100,112]];
    return pos.map((c,i)=>`<circle cx="${c[0]}" cy="${c[1]}" r="15" fill="url(#${i%2?'n':'p'})" stroke="#0a0d1a" stroke-width="1.5"/>`).join('');
  })()}
</svg>`;

// Simple vector silhouette for the "Human" frame (classroom-appropriate stand-in
// for a photo) — a plain, gender-neutral standing figure, same idea as the SVG
// nucleus above.
const HUMAN_SVG = `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <ellipse cx="100" cy="182" rx="34" ry="5" fill="#000" opacity="0.35"/>
  <g fill="#eef2ff">
    <circle cx="100" cy="38" r="17"/>
    <rect x="80" y="58" width="40" height="54" rx="15"/>
    <rect x="60" y="60" width="17" height="52" rx="8.5" transform="rotate(-8 68.5 60)"/>
    <rect x="123" y="60" width="17" height="52" rx="8.5" transform="rotate(8 131.5 60)"/>
    <rect x="81" y="106" width="17" height="72" rx="8.5"/>
    <rect x="102" y="106" width="17" height="72" rx="8.5"/>
  </g>
</svg>`;

// Distance diagram: two bodies separated by a labelled gap (illustrates a DISTANCE, not the object).
// a/b = {img|star, size(%), label, xpc(% position)} ; pill = centred distance text.
function distance({a, b, pill, space}){
  const bodyHtml = (o)=> o.star
    ? `<div class="dstar" style="left:${o.xpc}%;width:${o.size}%;aspect-ratio:1/1"></div>`
    : `<div class="dbody" style="left:${o.xpc}%;width:${o.size}%;transform:translate(-50%,-50%)"><img src="${lsrc(o.img)}" alt=""></div>`;
  const capHtml = (o)=> `<div class="dcap" style="left:${o.xpc}%;top:78%">${o.label}</div>`;
  return `<div class="diagram ${space?'space':''}">
    <div class="dline"></div>
    ${bodyHtml(a)}${bodyHtml(b)}
    ${capHtml(a)}${capHtml(b)}
    <div class="dpill">${pill}</div>
  </div>`;
}

// LEFT = zoom IN through matter.  Index 0 is the shared 1 m human.
const LEFT = [
  {name:"Human",   content:HUMAN_SVG, human:true, exp:0.23, sub:"a person · ≈1.7 m"},
  {name:"Hair",    local:"hair.jpg",    exp:-4.1, sub:"a human hair · ≈0.08 mm"},
  {name:"Cell",    local:"cell.jpeg",   exp:-5.7, sub:"a living cell · ≈2 µm"},
  {name:"Virus",   local:"virus.jpeg",  exp:-6.8, sub:"a virus · ≈150 nm"},
  {name:"Protein", local:"protein.png", exp:-8.5, sub:"a protein / DNA · ≈3 nm"},
  {name:"Atom",    local:"atom.jpg", z:0.85, exp:-10.0,sub:"an atom · ≈0.1 nm",
    ref:"https://journals.aps.org/prl/abstract/10.1103/PhysRevLett.110.213001",
    refLabel:"Stodolna et al., PRL 110, 213001 (2013)"},
  {name:"Nucleus", content:NUCLEUS_SVG, nuc:true,          exp:-15.0,sub:"an atomic nucleus · ≈1 fm"},
];

// RIGHT = zoom OUT through space.  Index 0 is the shared 1 m human (same image).
const RIGHT = [
  {name:"Human",         content:HUMAN_SVG, human:true, exp:0.23, sub:"a person · ≈1.7 m"},
  {name:"Bielefeld→Gütersloh", local:"bielfeld-gutersloh.png", fit:"contain", z:0.8, exp:4.18, sub:"two neighbouring towns · ≈15 km"},
  {name:"Germany",       local:"germany.png", fit:"contain", z:0.8, exp:5.94, sub:"north–south Germany · ≈880 km"},
  {name:"Earth",         local:"earth.jpg",  exp:7.10, sub:"the whole planet · ≈12,700 km"},
  {name:"To the Moon", exp:8.58, sub:"distance to the Moon · ≈384,000 km",
    content:distance({space:true,
      a:{img:"earth.jpg", size:24, xpc:20, label:"Earth"},
      b:{img:"moon.jpg", size:13, xpc:80, label:"Moon"},
      pill:"≈ 384,000 km · 30 Earths apart"})},
  {name:"To the Sun", exp:11.17, sub:"≈ distance to the Sun · 1 AU",
    content:distance({space:true,
      a:{img:"earth.jpg", size:9, xpc:16, label:"Earth"},
      b:{img:"sun.jpg", size:34, xpc:78, label:"Sun"},
      pill:"≈ 1 AU · 150 million km · 8 light-minutes"})},
  {name:"To Proxima", exp:16.60, sub:"≈ distance to the nearest star · 4.2 ly",
    content:distance({space:true,
      a:{img:"sun.jpg", size:18, xpc:17, label:"our Sun"},
      b:{star:true, size:5, xpc:83, label:"Proxima Centauri"},
      pill:"≈ 4.2 light-years · 40 trillion km"})},
];

const N = LEFT.length;       // 7
const K = 6.5;               // visual zoom factor per rung
const SMAX = 3000;

function buildLayers(wrapId, data){
  const wrap = document.getElementById(wrapId);
  return data.map(d=>{
    const layer = document.createElement('div');
    layer.className='layer';
    if(d.content){
      const box=document.createElement('div');
      box.className='contentbox'+(d.nuc?' nuc':'')+(d.human?' human':'');
      box.innerHTML=d.content;
      layer.appendChild(box);
    } else {
      const box=document.createElement('div'); box.className='imgbox';
      const img=document.createElement('img');
      img.src=d.local ? lsrc(d.local) : fpath(d.img); img.alt=d.name; img.loading='eager';
      if(d.z) img.style.transform='scale('+d.z+')';   // per-image zoom (<1 = zoomed out)
      if(d.fit) img.style.objectFit=d.fit;            // 'contain' shows the whole image
      box.appendChild(img); layer.appendChild(box);
    }
    wrap.appendChild(layer);
    return layer;
  });
}
const layersL = buildLayers('wrapL', LEFT);
const layersR = buildLayers('wrapR', RIGHT);

const ticks = document.getElementById('ticks');
const tickEls = LEFT.map((d,i)=>{
  const s=document.createElement('span');
  s.innerHTML = i===0 ? "Human" : `${LEFT[i].name} ⟷ ${RIGHT[i].name}`;
  s.onclick = ()=> animateTo(i);
  ticks.appendChild(s);
  return s;
});

const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;

function paint(layers, t, dir){
  layers.forEach((layer,i)=>{
    const d = t - i;
    const op = clamp(1 - Math.abs(d), 0, 1);
    // Fully-invisible layers still get GPU-tiled/composited if only opacity is
    // zeroed (worse here since each carries a big <img> + blur filter + a huge
    // transform:scale from being many rungs away) -- drop them from the render
    // tree entirely instead of just hiding them.
    layer.style.display = op>0 ? 'flex' : 'none';
    if(op<=0) return;
    const scale = Math.pow(K, dir*d);          // dir=+1 dive in, dir=-1 fly out
    layer.style.opacity = op.toFixed(3);
    layer.style.transform = `scale(${scale.toFixed(4)})`;
    layer.style.filter = op<1 ? `blur(${((1-op)*6).toFixed(1)}px)` : 'none';
    layer.style.zIndex = op>0.5?2:1;
  });
}

function fmt(exp){
  const e=Math.floor(exp), mant=Math.pow(10,exp-e);
  const sup=String(e).replace(/-/,'⁻').replace(/[0-9]/g,d=>"⁰¹²³⁴⁵⁶⁷⁸⁹"[d]);
  return `${mant.toFixed(1)} × 10${sup} m`;
}

function render(t){
  paint(layersL, t, +1);
  paint(layersR, t, -1);
  const near=Math.round(t);
  const i0=clamp(Math.floor(t),0,N-2), f=t-i0;
  nameL.textContent=LEFT[near].name;  subL.textContent=LEFT[near].sub;
  nameR.textContent=RIGHT[near].name; subR.textContent=RIGHT[near].sub;
  setRef(refL, LEFT[near]); setRef(refR, RIGHT[near]);
  sizeL.innerHTML=fmt(lerp(LEFT[i0].exp, LEFT[i0+1].exp, f));
  sizeR.innerHTML=fmt(lerp(RIGHT[i0].exp, RIGHT[i0+1].exp, f));
  tickEls.forEach((el,i)=> el.classList.toggle('active', i===near));
}
const nameL=document.getElementById('nameL'), subL=document.getElementById('subL'), sizeL=document.getElementById('sizeL');
const nameR=document.getElementById('nameR'), subR=document.getElementById('subR'), sizeR=document.getElementById('sizeR');
const refL=document.getElementById('refL'), refR=document.getElementById('refR');
function setRef(el,d){
  if(d.ref){el.href=d.ref; el.textContent='↗ '+(d.refLabel||'reference'); el.style.display='inline-block';}
  else {el.style.display='none';}
}

const slider=document.getElementById('slider');
let current=0;
slider.addEventListener('input',()=>{current=(slider.value/SMAX)*(N-1);render(current);});

let raf=null;
function animateTo(level){
  cancelAnimationFrame(raf);
  const target=clamp(level,0,N-1), start=current, dur=700, t0=performance.now();
  (function step(now){
    const p=clamp((now-t0)/dur,0,1);
    const e=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
    current=lerp(start,target,e);
    slider.value=(current/(N-1))*SMAX;
    render(current);
    if(p<1) raf=requestAnimationFrame(step);
  })(performance.now());
}
document.getElementById('next').onclick=()=>animateTo(Math.round(current)+1);
document.getElementById('prev').onclick=()=>animateTo(Math.round(current)-1);
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')animateTo(Math.round(current)+1);
  if(e.key==='ArrowLeft')animateTo(Math.round(current)-1);
});

render(0);
</script>
</body>
</html>
